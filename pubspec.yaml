name: streak_forge
description: "StreakForge - A powerful habit tracking app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Charts & Visualization
  fl_chart: ^0.69.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # CSV Export & Backup
  csv: ^6.0.0
  share_plus: ^10.1.4
  file_picker: ^8.1.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
